services:
    conduit:
        image: conduit-local:latest
        container_name: conduit
        restart: unless-stopped
        command:
            [
                "start",
                "--max-clients",
                "50",
                "--bandwidth",
                "50",
                "--data-dir",
                "/home/conduit/data",
                "--traffic-limit",
                "500",
                "--traffic-period",
                "10",
            ]
        volumes:
            - conduit-data:/home/conduit/data

volumes:
    conduit-data:
